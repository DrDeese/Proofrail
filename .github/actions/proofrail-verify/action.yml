name: Proofrail verify
description: Verify a prepared Proofrail case or a local committed Git change

inputs:
  case-directory:
    description: Workspace-relative supported Proofrail case directory
    required: false
  repo:
    description: Workspace-relative Git repository for change verification
    required: false
  base:
    description: Exact base commit or ref for change verification
    required: false
  head:
    description: Exact head commit or ref for change verification
    required: false
  claim-file:
    description: Workspace-relative explicit Proofrail completion-claim file
    required: false
  policy-file:
    description: Optional workspace-relative bounded Proofrail acceptance policy
    required: false
  check-claims:
    description: Check claim path coverage before Git-change verification (false or true)
    required: false
    default: "false"
  format:
    description: Result format printed to the action log (json or markdown)
    required: false
    default: json

outputs:
  claims-synchronized:
    description: Whether the completed claim freshness check found exact coverage
    value: ${{ steps.verify.outputs.claims-synchronized }}
  claim-check-json-path:
    description: Workspace-relative path to the deterministic claim-check JSON result
    value: ${{ steps.verify.outputs.claim-check-json-path }}
  overall-verdict:
    description: Deterministically aggregated Proofrail verdict
    value: ${{ steps.verify.outputs.overall-verdict }}
  result-json-path:
    description: Workspace-relative path to the deterministic JSON result
    value: ${{ steps.verify.outputs.result-json-path }}
  policy-accepted:
    description: Whether the optional acceptance policy accepted the completed result
    value: ${{ steps.verify.outputs.policy-accepted }}
  policy-result-json-path:
    description: Workspace-relative path to the deterministic policy result
    value: ${{ steps.verify.outputs.policy-result-json-path }}

runs:
  using: composite
  steps:
    - id: verify
      shell: bash
      env:
        INPUT_CASE_DIRECTORY: ${{ inputs.case-directory }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_BASE: ${{ inputs.base }}
        INPUT_HEAD: ${{ inputs.head }}
        INPUT_CLAIM_FILE: ${{ inputs.claim-file }}
        INPUT_POLICY_FILE: ${{ inputs.policy-file }}
        INPUT_CHECK_CLAIMS: ${{ inputs.check-claims }}
        INPUT_FORMAT: ${{ inputs.format }}
      run: python3 "$GITHUB_ACTION_PATH/run.py"
