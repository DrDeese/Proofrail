name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install build and validation tools
        run: |
          python3 -m pip install --disable-pip-version-check \
            "setuptools==58.0.4" "wheel==0.37.0" "twine==6.2.0"
          python3 - <<'PY'
          import setuptools
          import wheel

          assert setuptools.__version__ == "58.0.4", setuptools.__version__
          assert wheel.__version__ == "0.37.0", wheel.__version__
          PY
      - name: Run full test suite
        run: |
          for test_file in $(find tests -type f -name 'test*.py' | sort); do
            PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python3 "$test_file"
          done
      - name: Build wheel and source distribution
        run: python3 scripts/build_release_artifacts.py --repository . --output-dir dist
      - name: Check distribution metadata
        run: python3 -m twine check --strict dist/*.whl dist/*.tar.gz
      - name: Require package version to match tag
        env:
          RELEASE_REF: ${{ github.ref }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          case "$RELEASE_REF" in
            refs/tags/v*) ;;
            *)
              echo "Release runs require a v* tag; got $RELEASE_REF" >&2
              exit 1
              ;;
          esac
          EXPECTED_VERSION="${RELEASE_TAG#v}" python3 - <<'PY'
          import email
          import os
          from pathlib import Path
          import tarfile
          import zipfile

          wheels = list(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one wheel, found {len(wheels)}")
          with zipfile.ZipFile(wheels[0]) as archive:
              metadata_names = [
                  name for name in archive.namelist()
                  if name.endswith(".dist-info/METADATA")
              ]
              if len(metadata_names) != 1:
                  raise SystemExit(
                      f"expected one METADATA file, found {len(metadata_names)}"
                  )
              wheel_metadata = email.message_from_bytes(
                  archive.read(metadata_names[0])
              )
          sdists = list(Path("dist").glob("*.tar.gz"))
          if len(sdists) != 1:
              raise SystemExit(f"expected one sdist, found {len(sdists)}")
          with tarfile.open(sdists[0], mode="r:gz") as archive:
              pkg_info_names = [
                  name for name in archive.getnames()
                  if name.endswith("/PKG-INFO")
                  and len(Path(name).parts) == 2
              ]
              if len(pkg_info_names) != 1:
                  raise SystemExit(
                      f"expected one PKG-INFO file, found {len(pkg_info_names)}"
                  )
              source = archive.extractfile(pkg_info_names[0])
              if source is None:
                  raise SystemExit("cannot read sdist PKG-INFO")
              sdist_metadata = email.message_from_bytes(source.read())
          expected = os.environ["EXPECTED_VERSION"]
          versions = {
              "wheel": wheel_metadata["Version"],
              "sdist": sdist_metadata["Version"],
          }
          if any(actual != expected for actual in versions.values()):
              raise SystemExit(
                  f"package versions {versions!r} do not match tag version {expected!r}"
              )
          print(f"Package versions match tag: {versions}")
          PY
      - name: Test installed wheel outside repository
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          WHEEL_PATH="$(realpath dist/*.whl)"
          CLEAN_ENV="$RUNNER_TEMP/proofrail-release-venv"
          python3 -m venv "$CLEAN_ENV"
          env -u PYTHONPATH "$CLEAN_ENV/bin/python" -m pip install \
            --no-index --no-deps "$WHEEL_PATH"
          (
            cd "$RUNNER_TEMP"
            ACTUAL_VERSION="$(env -u PYTHONPATH "$CLEAN_ENV/bin/proofrail" --version)"
            EXPECTED_VERSION="${RELEASE_TAG#v}"
            if [ "$ACTUAL_VERSION" != "$EXPECTED_VERSION" ]; then
              echo "installed version $ACTUAL_VERSION does not match $EXPECTED_VERSION" >&2
              exit 1
            fi
            env -u PYTHONPATH "$CLEAN_ENV/bin/proofrail" verify --demo \
              --format json > proofrail-demo-result.json
            python3 - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(
              Path("proofrail-demo-result.json").read_text(encoding="utf-8")
          )
          if result["overall_verdict"] != "partially_verified":
              raise SystemExit(
                  f"unexpected demo verdict: {result['overall_verdict']!r}"
              )
          print("Installed demo verdict: partially_verified")
          PY
          )
      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: proofrail-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: proofrail-distributions
          path: dist/
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
