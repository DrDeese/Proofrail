name: Proofrail fixtures

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        case:
          - tests/fixtures/001-partial-workflow-fix
          - tests/fixtures/002-incapable-validation-command
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: ./.github/actions/proofrail-verify
        id: proofrail
        with:
          case-directory: ${{ matrix.case }}
          format: json
      - name: Assert fixture result
        env:
          PROOFRAIL_STEP_CONTRACT: contracts/step-15.yml
          PROOFRAIL_CASE_DIRECTORY: ${{ matrix.case }}
          PROOFRAIL_VERDICT: ${{ steps.proofrail.outputs.overall-verdict }}
          PROOFRAIL_RESULT_PATH: ${{ steps.proofrail.outputs.result-json-path }}
        run: |
          python3 - "$PROOFRAIL_STEP_CONTRACT" "$PROOFRAIL_CASE_DIRECTORY" "$PROOFRAIL_VERDICT" "$PROOFRAIL_RESULT_PATH" <<'PY'
          import json
          import runpy
          import sys
          from pathlib import Path

          contract_path = Path(sys.argv[1])
          preflight = runpy.run_path("scripts/proofrail_step_preflight.py")
          raw = preflight["parse_bounded_yaml"](
              contract_path.read_text(encoding="utf-8"), contract=True
          )
          schema = json.loads(
              Path("contracts/step-contract.schema.json").read_text(encoding="utf-8")
          )
          contract = preflight["validate_contract"](raw, schema)
          fixture_id = Path(sys.argv[2]).name
          expected = contract["expectations"]["fixture-verdicts"].get(fixture_id)
          if expected is None or sys.argv[3] != expected:
              raise SystemExit("fixture verdict does not match the active contract")
          result_path = Path(sys.argv[4])
          if not result_path.is_file():
              raise SystemExit("Proofrail fixture JSON result is missing")
          with result_path.open(encoding="utf-8") as source:
              result = json.load(source)
          if result["case_id"] != fixture_id or result["overall_verdict"] != expected:
              raise SystemExit("fixture JSON does not match the active contract")
          PY

  dogfood-pull-request:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Record exact pull request range
        shell: bash
        env:
          PROOFRAIL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PROOFRAIL_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          printf 'Proofrail base SHA: %s\n' "$PROOFRAIL_BASE_SHA"
          printf 'Proofrail head SHA: %s\n' "$PROOFRAIL_HEAD_SHA"
          git cat-file -e "$PROOFRAIL_BASE_SHA^{commit}"
          git cat-file -e "$PROOFRAIL_HEAD_SHA^{commit}"
      - uses: ./.github/actions/proofrail-verify
        id: proofrail
        with:
          repo: .
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          claim-file: .proofrail/claim.md
          policy-file: .proofrail/policy.yml
          check-claims: true
          format: json
      - name: Assert dogfood result
        env:
          PROOFRAIL_STEP_CONTRACT: contracts/step-15.yml
          PROOFRAIL_VERDICT: ${{ steps.proofrail.outputs.overall-verdict }}
          PROOFRAIL_RESULT_PATH: ${{ steps.proofrail.outputs.result-json-path }}
          PROOFRAIL_CLAIMS_SYNCHRONIZED: ${{ steps.proofrail.outputs.claims-synchronized }}
          PROOFRAIL_CLAIM_CHECK_PATH: ${{ steps.proofrail.outputs.claim-check-json-path }}
          PROOFRAIL_POLICY_ACCEPTED: ${{ steps.proofrail.outputs.policy-accepted }}
          PROOFRAIL_POLICY_RESULT_PATH: ${{ steps.proofrail.outputs.policy-result-json-path }}
        run: |
          python3 - "$PROOFRAIL_STEP_CONTRACT" "$PROOFRAIL_CLAIM_CHECK_PATH" "$PROOFRAIL_RESULT_PATH" "$PROOFRAIL_POLICY_RESULT_PATH" <<'PY'
          import json
          import os
          import runpy
          import sys
          from pathlib import Path

          contract_path = Path(sys.argv[1])
          preflight = runpy.run_path("scripts/proofrail_step_preflight.py")
          raw = preflight["parse_bounded_yaml"](
              contract_path.read_text(encoding="utf-8"), contract=True
          )
          schema = json.loads(
              Path("contracts/step-contract.schema.json").read_text(encoding="utf-8")
          )
          contract = preflight["validate_contract"](raw, schema)
          expectations = contract["expectations"]
          workflow_path = Path(contract["workflow"]["path"])
          workflow_text = workflow_path.read_text(encoding="utf-8")
          workflow = preflight["parse_bounded_yaml"](workflow_text, contract=False)
          source = Path("scripts/proofrail_step_preflight.py").read_text(encoding="utf-8")
          reason, offending = preflight["validate_contract_source"](
              contract, contract_path.as_posix(), workflow, workflow_text, source
          )
          if reason:
              raise SystemExit(f"contract-source mismatch: {reason}: {offending!r}")
          for result_path in map(Path, sys.argv[2:]):
              if not result_path.is_file():
                  raise SystemExit(f"Proofrail JSON result is missing: {result_path}")
          with open(sys.argv[2], encoding="utf-8") as source:
              claim_check = json.load(source)
          if (
              claim_check["synchronized"] is not True
              or os.environ["PROOFRAIL_CLAIMS_SYNCHRONIZED"] != "true"
          ):
              raise SystemExit(f"unexpected Proofrail claim check: {claim_check!r}")
          expected = expectations["claim-statuses"]
          if claim_check["changed_path_count"] != len(expected):
              raise SystemExit(f"unexpected changed-path count: {claim_check!r}")
          if claim_check["claim_predicate_count"] != len(expected):
              raise SystemExit(f"unexpected claim-predicate count: {claim_check!r}")
          if any(claim_check[key] for key in ("missing", "stale", "conflicts", "duplicates")):
              raise SystemExit(f"unexpected Proofrail claim drift: {claim_check!r}")
          matched = {
              item["claim_id"]: item["change"] for item in claim_check["matched"]
          }
          expected_changes = {
              claim_id: "added" if claim_id.endswith("-added") else "modified"
              for claim_id in expected
          }
          if matched != expected_changes:
              raise SystemExit(f"unexpected Proofrail claim coverage: {matched!r}")
          with open(sys.argv[3], encoding="utf-8") as source:
              result = json.load(source)
          statuses = {claim["claim_id"]: claim["status"] for claim in result["claims"]}
          if statuses != expected or result["overall_verdict"] != expectations["overall-verdict"]:
              raise SystemExit(f"unexpected Proofrail statuses: {statuses!r}")
          if os.environ["PROOFRAIL_VERDICT"] != expectations["overall-verdict"]:
              raise SystemExit("Proofrail verdict output does not match the active contract")
          with open(sys.argv[4], encoding="utf-8") as source:
              policy = json.load(source)
          if policy["accepted"] is not expectations["policy-accepted"]:
              raise SystemExit(f"unexpected Proofrail policy result: {policy!r}")
          if os.environ["PROOFRAIL_POLICY_ACCEPTED"] != str(
              expectations["policy-accepted"]
          ).lower():
              raise SystemExit("Proofrail policy output does not match the active contract")
          decisions = {
              decision["claim_id"]: decision for decision in policy["claim_decisions"]
          }
          if not all(decision["accepted"] for decision in decisions.values()):
              raise SystemExit(f"unexpected rejected claim decision: {decisions!r}")
          if set(decisions) != set(expected):
              raise SystemExit(f"unexpected Proofrail policy decisions: {decisions!r}")
          if not all(
              decision["rule"] == expectations["allowed-statuses-source"]
              for decision in decisions.values()
          ):
              raise SystemExit(f"unexpected Proofrail exception rule: {decisions!r}")
          applied = sorted(
              decision["claim_id"]
              for decision in decisions.values()
              if decision["rule"] != expectations["allowed-statuses-source"]
          )
          if applied != sorted(expectations["exceptions-applied"]):
              raise SystemExit(f"unexpected Proofrail exceptions: {applied!r}")
          expected_overall = {
              "accepted": expectations["policy-accepted"],
              "verdict": expectations["overall-verdict"],
          }
          if policy["overall_decision"] != expected_overall:
              raise SystemExit(f"unexpected overall policy decision: {policy!r}")
          if policy["reasons"]:
              raise SystemExit(f"unexpected Proofrail policy reasons: {policy!r}")
          PY
