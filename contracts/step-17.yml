version: 1
step: 17
base-sha: 3bdeeafa84dede545715c99fd332c7f166df1310

workflow:
  path: .github/workflows/proofrail-fixtures.yml

tests:
  action:
    command:
      - python3
      - -m
      - unittest
      - discover
      - -s
      - tests/action
      - -v
  end-to-end:
    command:
      - python3
      - -m
      - unittest
      - discover
      - -s
      - tests/end_to_end
      - -v
  policy:
    command:
      - python3
      - -m
      - unittest
      - discover
      - -s
      - tests/policy
      - -v

authorized-files:
  - .github/workflows/proofrail-fixtures.yml
  - .proofrail/claim.md
  - CHANGELOG.md
  - README.md
  - contracts/step-17.yml
  - docs/PROJECT_STATUS.md
  - docs/QUICKSTART.md
  - docs/RELEASING.md
  - pyproject.toml
  - scripts/build_release_artifacts.py
  - setup.cfg
  - setup.py
  - src/proofrail_verifier/__init__.py
  - src/proofrail_verifier/evaluation.py
  - src/proofrail_verifier/loading.py
  - src/proofrail_verifier/preparation.py
  - tests/action/test_action.py
  - tests/docs/test_public_documentation.py
  - tests/packaging/test_distribution.py

expectations:
  claim-statuses:
    github-workflows-proofrail-fixtures-yml-modified: verified
    proofrail-claim-md-modified: verified
    changelog-md-added: verified
    readme-md-modified: verified
    contracts-step-17-yml-added: verified
    docs-project-status-md-modified: verified
    docs-quickstart-md-modified: verified
    docs-releasing-md-added: verified
    pyproject-toml-added: verified
    scripts-build-release-artifacts-py-added: verified
    setup-cfg-added: verified
    setup-py-added: verified
    src-proofrail-verifier-init-py-modified: verified
    src-proofrail-verifier-evaluation-py-modified: verified
    src-proofrail-verifier-loading-py-modified: verified
    src-proofrail-verifier-preparation-py-modified: verified
    tests-action-test-action-py-modified: verified
    tests-docs-test-public-documentation-py-modified: verified
    tests-packaging-test-distribution-py-added: verified
  overall-verdict: verified
  policy-accepted: true
  allowed-statuses-source: claims.allowed-statuses
  exceptions-applied: []
  fixture-verdicts:
    001-partial-workflow-fix: partially_verified
    002-incapable-validation-command: partially_verified

security:
  permissions:
    contents: read
  approved-actions:
    - actions/checkout@v4
    - actions/setup-python@v5
    - ./.github/actions/proofrail-verify
  fetch-depth: 0
  persist-credentials: false

stale-identifiers:
