version: 1
step: 16
base-sha: cd601f9a5d21a85ce46cc6b8abda55f8907a126c

workflow:
  path: .github/workflows/proofrail-fixtures.yml

tests:
  action:
    command:
      - python3
      - -m
      - unittest
      - discover
      - -s
      - tests/action
      - -v
  end-to-end:
    command:
      - python3
      - -m
      - unittest
      - discover
      - -s
      - tests/end_to_end
      - -v
  policy:
    command:
      - python3
      - -m
      - unittest
      - discover
      - -s
      - tests/policy
      - -v

authorized-files:
  - .github/workflows/proofrail-fixtures.yml
  - .proofrail/claim.md
  - README.md
  - contracts/step-16.yml
  - docs/PILOT_GUIDE.md
  - docs/PROJECT_STATUS.md
  - docs/QUICKSTART.md
  - docs/examples/partial-workflow-fix.md
  - tests/action/test_action.py
  - tests/docs/test_public_documentation.py

expectations:
  claim-statuses:
    github-workflows-proofrail-fixtures-yml-modified: verified
    proofrail-claim-md-modified: verified
    readme-md-modified: verified
    contracts-step-16-yml-added: verified
    docs-pilot-guide-md-added: verified
    docs-project-status-md-added: verified
    docs-quickstart-md-added: verified
    docs-examples-partial-workflow-fix-md-added: verified
    tests-action-test-action-py-modified: verified
    tests-docs-test-public-documentation-py-added: verified
  overall-verdict: verified
  policy-accepted: true
  allowed-statuses-source: claims.allowed-statuses
  exceptions-applied: []
  fixture-verdicts:
    001-partial-workflow-fix: partially_verified
    002-incapable-validation-command: partially_verified

security:
  permissions:
    contents: read
  approved-actions:
    - actions/checkout@v4
    - actions/setup-python@v5
    - ./.github/actions/proofrail-verify
  fetch-depth: 0
  persist-credentials: false

stale-identifiers:
  - value: codex-skills-proofrail-scope-escalation-skill-md-added
    owner-step: 15
    allowed-files:
      - contracts/step-16.yml
  - value: contracts-step-15-yml-added
    owner-step: 15
    allowed-files:
      - contracts/step-16.yml
  - value: tests-skills-test-scope-escalation-skill-py-added
    owner-step: 15
    allowed-files:
      - contracts/step-16.yml
  - value: contracts/step-15.yml
    owner-step: 15
    allowed-files:
      - contracts/step-16.yml
